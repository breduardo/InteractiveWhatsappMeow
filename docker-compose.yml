services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-interactivewhatsmeow}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-interactivewhatsmeow}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-development}
      ADDR: :3000
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-interactivewhatsmeow}?sslmode=disable
      API_KEY: ${API_KEY:-dev-change-me}
      WEBHOOK_BATCH_SIZE: ${WEBHOOK_BATCH_SIZE:-25}
      WEBHOOK_MAX_ATTEMPTS: ${WEBHOOK_MAX_ATTEMPTS:-5}
      WEBHOOK_POLL_INTERVAL: ${WEBHOOK_POLL_INTERVAL:-2s}
      WEBHOOK_REQUEST_TIMEOUT: ${WEBHOOK_REQUEST_TIMEOUT:-10s}
      PAIR_CODE_DISPLAY_NAME: ${PAIR_CODE_DISPLAY_NAME:-InteractiveWhatsMeow}
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

volumes:
  postgres_data:

